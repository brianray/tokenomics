<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tokenomics</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #1f2937, #0f172a);
      }

      main {
        width: min(720px, 92vw);
        padding: 2rem;
        border-radius: 1rem;
        background: rgb(17 24 39 / 90%);
        border: 1px solid rgb(148 163 184 / 30%);
        box-shadow: 0 20px 45px rgb(2 6 23 / 40%);
      }

      h1 {
        margin-top: 0;
        font-size: clamp(1.8rem, 4vw, 2.5rem);
      }

      p {
        line-height: 1.6;
      }

      .pill {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.4rem 0.8rem;
        border-radius: 999px;
        font-size: 0.9rem;
        border: 1px solid rgb(148 163 184 / 40%);
        background: rgb(30 41 59 / 70%);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>GitHub Pages Static Template</h1>
      <p>
        This repository is ready to deploy a self-contained static webpage.
        Replace this file with your own HTML/CSS/JS (all inline or local files)
        and push to <code>main</code>.
      </p>
      <span class="pill">Deployed by GitHub Actions → Pages</span>
    </main>
  </body>
</html>
